      - key: OWNER_ID
        value: 8595999663
      - key: GEMINI_API_KEY
        value: AQ.Ab8RN6JQHBHBLc7zBiWBi-NeCTU2aDR-Cr-Qm0WxWGsBhtJ0HQ
      - key: PORT
        value: 3000

  - type: postgres
    name: nexus-db
    plan: free
    ipAllowList: []